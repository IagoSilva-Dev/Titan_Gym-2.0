<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cadastro">
        <img src="imagens/Logo.png">

        <h1>Cadastro</h1>

        <form>

            <label>Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

            <label>Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="data_nascimento">

            <label>Email:</label>
            <input type="text" id="email" name="email" placeholder="Digite seu email">

            <label>Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

            <label>Confirmar Senha:</label>
            <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirme sua senha"><br>

            <input type="checkbox" id="confirmar" name="confirmar">
            <label>Confirmo o envio dos meus dados</label><br><br>
           
        </form>

       <button id="btnCadastrar">Enviar</button>

       <button id="btnLogin">Login</button>

    </div>
   
<script src="cadastro.js"></script>

</body>
</html>
